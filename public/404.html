<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Harsh Gupta</title>
    <!--
      GitHub Pages SPA redirect shim (rafgraph/spa-github-pages, MIT).
      GitHub Pages serves this file for any unknown path (e.g. /portfolio/work on refresh).
      It rewrites the path into a query string and bounces to the app's index.html,
      where a matching snippet in index.html restores the real URL before React mounts.

      pathSegmentsToKeep = 1 because the app lives under one sub-path (/portfolio/).
      For a user site served at the domain root, set this to 0.
    -->
    <script>
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
