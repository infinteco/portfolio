<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/portfolio/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Harsh Gupta — Software Engineer, AI/ML + Backend</title>
    <meta name="description" content="Harsh Gupta builds AI-driven web applications — backend APIs, ML pipelines, and the systems that connect them." />

    <!-- Rich link previews: when the URL is shared (LinkedIn, Slack, email, WhatsApp),
         these drive a professional preview card. Crawlers read the initial HTML, so
         these must be static here (not set at runtime). Image URLs are absolute. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Harsh Gupta" />
    <meta property="og:url" content="https://infinteco.github.io/portfolio/" />
    <meta property="og:title" content="Harsh Gupta — Software Engineer, AI/ML + Backend" />
    <meta property="og:description" content="I build AI-driven web applications — backend APIs, ML pipelines, and the systems that connect them. 92% recommender accuracy · 35% faster inference · 99.27 percentile." />
    <meta property="og:image" content="https://infinteco.github.io/portfolio/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Harsh Gupta — Software Engineer, AI/ML and Backend" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Harsh Gupta — Software Engineer, AI/ML + Backend" />
    <meta name="twitter:description" content="AI-driven web apps — backend APIs, ML pipelines, and the systems that connect them." />
    <meta name="twitter:image" content="https://infinteco.github.io/portfolio/og.png" />
    <meta name="theme-color" content="#FBFAF8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0E0D0C" media="(prefers-color-scheme: dark)" />

    <!-- Real Google Fonts pairing: Space Grotesk (display) + Inter (body, tabular figures) + JetBrains Mono (labels) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Initial loading state: covers the blank #root until the React bundle mounts.
         Self-contained (own styles) so it works before the app CSS loads. React's
         createRoot().render() replaces #root's contents, removing this automatically. -->
    <style>
      #root .app-loading {
        position: fixed; inset: 0; z-index: 1;
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.9rem;
        background: #FBFAF8; color: #16130F;
        font-family: "Space Grotesk", system-ui, sans-serif;
      }
      .app-loading__dot { width: 0.7rem; height: 0.7rem; border-radius: 50%; background: #D8351A;
        animation: app-pulse 1s ease-in-out infinite; }
      .app-loading__name { font-weight: 600; letter-spacing: -0.01em; font-size: 1.05rem; opacity: 0.85; }
      @keyframes app-pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(0.5); opacity: 0.35; } }
      @media (prefers-color-scheme: dark) {
        #root .app-loading { background: #0E0D0C; color: #F1ECE4; }
        .app-loading__dot { background: #FF6242; }
      }
      @media (prefers-reduced-motion: reduce) { .app-loading__dot { animation: none; } }
    </style>

    <!--
      Second half of the GitHub Pages SPA shim (see public/404.html).
      If we arrived via the 404 redirect, the real path is encoded in the query
      string as `/?/work`. Restore it with replaceState before React Router reads
      the URL, so the user never sees the `?/` form.
    -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root">
      <div class="app-loading" aria-hidden="true">
        <span class="app-loading__dot"></span>
        <span class="app-loading__name">Harsh Gupta</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
